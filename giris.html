                    <div>
                        <label for="login_eposta">E-posta Adresi:</label>

                    </div>
                    <div>
                        <label for="login_sifre">Şifre:</label>
                        <input type="password" id="login_sifre" name="login_sifre" required>
                    </div>
                    <button type="submit">Giriş Yap</button>
                </form>
            </div>
        </section>
