<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KomikSite - Kayıt Ol</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">KomikSite</div>
        <nav>
            <ul>
                <li><a href="index.html">Anasayfa</a></li>
                <li><a href="resimler.html">Komik Resimler</a></li>
                <li><a href="videolar.html">Videolar</a></li>
                <li><a href="yazilar.html">Yazılar</a></li>
                <li><a href="giris.html">Giriş Yap</a></li>
                <li><a href="kayit.html">Kayıt Ol</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section>
            <h2>Siteye Kayıt Ol</h2>
            <div class="content-box">
                <form action="#" method="POST">
                    <div>
                        <label for="kullanici_adi">Kullanıcı Adı:</label>
                        <input type="text" id="kullanici_adi" name="kullanici_adi" required minlength="3">
                    </div>
                    <div>
                        <label for="eposta">E-posta Adresi:</label>
                        <input type="email" id="eposta" name="eposta" required>
                    </div>
                    <div>
                        <label for="sifre">Şifre (En az 6 karakter):</label>
                        <input type="password" id="sifre" name="sifre" required minlength="6">
                    </div>
                    <button type="submit">Kayıt Ol</button>
                </form>
            </div>
        </section>
    </main>

   <footer>
        <p>Yusuf Can DAL</p>
    </footer>

</body>
</html>
